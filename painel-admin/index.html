<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Corujão</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<!-- PAINEL -->
<div id="painel">
  <header class="admin-header">
    <span>🦉 Painel Admin</span>
    <button id="btn-sair" class="btn-ghost">Sair</button>
  </header>

  <nav class="admin-tabs">
    <button class="admin-tab active" data-tab="produtos">📦 Produtos</button>
    <button class="admin-tab" data-tab="clientes">👥 Clientes</button>
  </nav>

  <main class="admin-main">

    <!-- ABA PRODUTOS -->
    <div id="tab-produtos" class="admin-tab-content active">
      <div class="toolbar">
        <div class="filtros">
          <input type="text" id="busca" placeholder="🔍 Buscar produto..." />
          <select id="filtro-tipo">
            <option value="">Todos os tipos</option>
            <option value="Cervejas">Cervejas</option>
            <option value="Copões">Copões</option>
            <option value="Combos">Combos</option>
            <option value="Destilados">Destilados</option>
            <option value="Doses">Doses</option>
            <option value="Gourmet">Gourmet</option>
            <option value="Garrafas">Garrafas</option>
          </select>
        </div>
        <button id="btn-novo" class="btn-primary">+ Novo Produto</button>
      </div>
      <div id="lista-produtos" class="produtos-grid"></div>
    </div>

    <!-- ABA CLIENTES -->
    <div id="tab-clientes" class="admin-tab-content hidden">
      <div class="toolbar">
        <div class="filtros">
          <input type="text" id="busca-cliente" placeholder="🔍 Buscar cliente..." />
        </div>
      </div>
      <div id="lista-clientes"></div>
    </div>

  </main>
</div>

<!-- MODAL PRODUTO -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modal-titulo">Novo Produto</h2>
      <button class="btn-close" id="btn-fechar-modal">✕</button>
    </div>

    <form id="form-produto">
      <input type="hidden" id="prod-id" />

      <!-- Fotos -->
      <div class="foto-area">
        <div id="fotos-previews" class="fotos-previews"></div>
        <div class="foto-acoes">
          <label class="btn-secondary" for="input-foto">📁 Adicionar foto(s)</label>
          <input type="file" id="input-foto" accept="image/*" multiple class="hidden" />
          <input type="text" id="prod-foto-url" placeholder="Ou cole uma URL e pressione Enter" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Nome *</label>
          <input type="text" id="prod-nome" required placeholder="Ex: Cerveja Heineken 600ml" />
        </div>
        <div class="form-group">
          <label>Tipo *</label>
          <select id="prod-categoria" required>
            <option value="">Selecione...</option>
            <option value="Cervejas">Cervejas</option>
            <option value="Copões">Copões</option>
            <option value="Combos">Combos</option>
            <option value="Destilados">Destilados</option>
            <option value="Doses">Doses</option>
            <option value="Gourmet">Gourmet</option>
            <option value="Garrafas">Garrafas</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Preço de Venda (R$) *</label>
          <input type="number" id="prod-preco-venda" step="0.01" min="0" required placeholder="0,00" />
        </div>
        <div class="form-group">
          <label>Preço de Custo (R$)</label>
          <input type="number" id="prod-preco-custo" step="0.01" min="0" placeholder="0,00" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Estoque atual</label>
          <input type="number" id="prod-estoque" min="0" value="0" />
        </div>
        <div class="form-group">
          <label>Estoque mínimo</label>
          <input type="number" id="prod-estoque-min" min="0" value="5" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select id="prod-status">
            <option value="ativo">Ativo</option>
            <option value="inativo">Inativo</option>
          </select>
        </div>
      </div>

      <div id="form-erro" class="erro hidden"></div>

      <div class="modal-footer">
        <button type="button" id="btn-cancelar" class="btn-secondary">Cancelar</button>
        <button type="submit" id="btn-salvar" class="btn-primary">💾 Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>
</body>
</html>
